<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Data Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="background-overlay"></div>

    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="logo">
                <h1>F1 <span class="accent">DATA</span> HUB</h1>
            </div>

            <div class="season-control">
                <select id="season-select" class="glass-select">
                    <option value="2026">2026 Season</option>
                    <option value="2025">2025 Season</option>
                    <option value="2024">2024 Season</option>
                    <option value="2023">2023 Season</option>
                    <option value="2022">2022 Season</option>
                    <option value="2021">2021 Season</option>
                    <option value="2020">2020 Season</option>
                </select>
            </div>
        </header>

        <!-- Hero Section / Countdown -->
        <section id="hero-section" class="hero mb-2">
            <div class="glass-panel hero-content">
                <h2>NEXT GRAND PRIX</h2>
                <div id="countdown-timer" class="countdown">
                    <div class="time-block"><span id="days">00</span><small>DAYS</small></div>
                    <div class="time-block"><span id="hours">00</span><small>HRS</small></div>
                    <div class="time-block"><span id="mins">00</span><small>MIN</small></div>
                </div>
                <h3 id="next-race-name">Loading...</h3>
                <p id="next-race-date" class="accent-text">--/--/----</p>
            </div>
            <div class="glass-panel stats-preview">
                <canvas id="miniChart"></canvas>
            </div>
        </section>

        <!-- Navigation Tabs -->
        <nav class="glass-nav">
            <button class="nav-btn active" data-view="races">RACES</button>
            <button class="nav-btn" data-view="drivers">DRIVERS</button>
            <button class="nav-btn" data-view="constructors">TEAMS</button>
        </nav>

        <!-- Main Content Area -->
        <main id="content-area">
            <!-- Races View (Masonry) -->
            <div id="races-view" class="view-section active">
                <div class="masonry-grid" id="races-list">
                    <!-- Cards injected by JS -->
                </div>
            </div>

            <!-- Drivers View -->
            <div id="drivers-view" class="view-section" style="display: none;">
                <div class="glass-panel full-width">
                    <canvas id="driversChart" height="100"></canvas>
                </div>
                <div class="glass-panel mt-2">
                    <table class="data-table" id="driver-standings-table">
                        <thead>
                            <tr>
                                <th>Pos</th>
                                <th>Driver</th>
                                <th>Team</th>
                                <th>Wins</th>
                                <th>Points</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- Constructors View -->
            <div id="constructors-view" class="view-section" style="display: none;">
                <div class="glass-panel full-width">
                    <canvas id="constructorsChart" height="100"></canvas>
                </div>
                <div class="glass-panel mt-2">
                    <table class="data-table" id="constructor-standings-table">
                        <thead>
                            <tr>
                                <th>Pos</th>
                                <th>Team</th>
                                <th>Wins</th>
                                <th>Points</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Template -->
    <div id="race-modal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close-modal">&times;</span>
            <div id="modal-body">
                <!-- Details injected by JS -->
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
